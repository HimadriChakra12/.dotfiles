# Alacritty Configuration

[colors]
# Normal colors
[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

# Bright colors
[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

# Cursor colors
[colors.cursor]
cursor = "#d4be98"
text   = "#282828"

# Primary colors (background / foreground)
[colors.primary]
background = "#292828"
foreground = "#ebdbb2"

# Font settings
[font]
normal = {family= "JetBrainsMono Nerd Font"}
size= 6.1

# Key bindings
[keyboard]
bindings = [
  { key = "Insert", mods = "Shift", action = "Paste" },
  { key = "Insert", mods = "Control", action = "Copy" },
  { key = "W", mods = "Control", action = "Quit" },
  { key = "T", mods = "Control", action = "SpawnNewInstance" },
]

[window]
padding.x = 20
padding.y = 20
decorations = "None"

# Cursor configuration
[cursor]
blink_interval = 580
unfocused_hollow = false

[cursor.style]
blinking = "On"
shape = "Block"
# Alt Cursor Beam\Underline
