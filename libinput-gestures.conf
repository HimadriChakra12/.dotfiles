# 3-finger swipe left/right = switch i3 workspace
gesture swipe left  3 i3-msg workspace next
gesture swipe right 3 i3-msg workspace prev

# 3-finger swipe up = toggle fullscreen
gesture swipe up    3 i3-msg fullscreen toggle

# pinch in/out (optional)
# gesture pinch in  xdotool key super+minus
# gesture pinch out xdotool key super+equal
